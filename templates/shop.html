<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F7M TEAM</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">F7M SHOP</a>
        <div>
            <a href="/">الرئيسية</a>
            <a href="/shop">المتجر</a>
        </div>
    </nav>

    <div class="container">
        <h1>جميع المنتجات</h1>
        <div class="product-grid">
            {% for p in products %}
            <div class="product-card">
                <img src="{{ url_for('static', filename='uploads/' + p['image_path'].split('/')[-1]) if p['image_path'] else '/static/default.png' }}" alt="{{ p['name'] }}">
                <h3>{{ p['name'] }}</h3>
                <p class="price">💰 {{ p['price']|int }}$</p>
                <p style="color: #FFD700; font-size: 14px; margin: -8px 0 12px;">💎 {{ (p['price'] * 100)|int }} جوهرة</p>
                <a href="/product/{{ p['id'] }}" class="btn-small">🔍 تفاصيل</a>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer>
        <p>© F7M - جميع الحقوق محفوظة</p>
    </footer>
</body>
</html>
